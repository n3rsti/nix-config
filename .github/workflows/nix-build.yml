name: Build NixOS hosts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nix-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = http://server.tail3ce7af.ts.net:8083/nixos
            extra-trusted-public-keys = nixos:lVIomUEQXDQPIh/gHzcss6+IgEZ8SMIXlsdlNOFV3jc=

      - run: nix profile install nixpkgs#attic-client

      - run: attic login personal http://server.tail3ce7af.ts.net:8083 "$ATTIC_TOKEN"
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

      - name: Check Attic connectivity
        run: |
          set -euo pipefail
          tailscale ping --c 5 server.tail3ce7af.ts.net
          attic cache info personal:nixos

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Build all hosts
        run: |
          set -euo pipefail

          nix build --print-build-logs \
            ".#nixosConfigurations.laptop.config.system.build.toplevel" \
            ".#nixosConfigurations.pc.config.system.build.toplevel" \
            ".#nixosConfigurations.server.config.system.build.toplevel"

      - name: Push all hosts to Attic
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if attic push --jobs 4 personal:nixos \
              ./result \
              ./result-1 \
              ./result-2; then
              exit 0
            fi

            if [ "$attempt" = 5 ]; then
              exit 1
            fi

            sleep 60
          done
