[audio]
enable_overdrive = true

[bar.default]
background_opacity = 0.45000000000000001
capsule = true
capsule_border = "outline"
capsule_fill = "#14141c88"
capsule_opacity = 0.68999998457729816
capsule_padding = 19.0
capsule_radius = 17
capsule_thickness = 0.9499999824911356
center = [ "clock", "media" ]
contact_shadow = true
end = [ "brightness", "volume", "bluetooth", "network", "battery", "notifications", "session" ]
font_family = "Adwaita Sans"
font_weight = 600
margin_ends = 0
scale = 0.90000000596046448
start = [ "workspaces", "tray" ]
thickness = 38

[brightness]
enable_ddcutil = true
minimum_brightness = 0.0099999997764825821

[calendar]
enabled = true
refresh_minutes = 5

    [calendar.account.home_nextcloud]
    provider = "custom"
    server_url = "https://nextcloud.tail3ce7af.ts.net/remote.php/dav/"
    type = "caldav"
    username = "n3rsti"

[calendar_credentials]
home_nextcloud_password = "#1C1728"

[control_center]
sidebar_section = "none"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "wallpaper"

[desktop_widgets]
enabled = false

[dock]
background_opacity = 0.78999998234212399

[hooks]
started = "/etc/nixos/modules/features/desktop/noctalia/_noctalia-startup.sh"

[location]
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-widget-0000000000000001", "lockscreen-widget-0000000000000002" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 80.0
    box_width = 400.0
    cx = 1280.0
    cy = 1310.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.20000000000000001
        background_radius = 16.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = false
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 272.0
    box_width = 608.0
    cx = 1280.0
    cy = 376.0
    output = "DP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        center_text = true
        shadow = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 128.0
    box_width = 560.0
    cx = 1264.0
    cy = 1152.0
    output = "DP-1"
    rotation = 0.0
    type = "media_player"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = true
        background_opacity = 0.14999999999999999
        hide_when_no_media = true
        layout = "horizontal"

[nightlight]
enabled = true

[notification]
background_opacity = 0.71999998390674591

[osd]
background_opacity = 0.5599999874830246
position = "top_right"

    [osd.kinds]
    power_profile = false

[plugins]
enabled = [ "noctalia/timer" ]

[shell]
corner_radius_scale = 0.60000000894069672
font_family = "Adwaita Sans"

    [shell.panel]
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    polkit_placement = "attached"
    session_placement = "floating"
    session_position = "top_right"
    transparency_mode = "glass"

    [shell.session]
    grid = true
    grid_columns = 1

[theme]
builtin = "Tokyo-Night"
community_palette = "Vesper"
custom_palette = "MyPalette"
source = "custom"

[wallpaper]
directory = "/etc/nixos/dotfiles/wallpapers"

    [wallpaper.default]
    path = "/etc/nixos/dotfiles/wallpapers/richard-horvath-_nWaeTF6qo0-unsplash.jpg"

    [wallpaper.last]
    path = "/etc/nixos/dotfiles/wallpapers/richard-horvath-_nWaeTF6qo0-unsplash.jpg"

    [wallpaper.monitors.DP-1]
    path = "/etc/nixos/dotfiles/wallpapers/richard-horvath-_nWaeTF6qo0-unsplash.jpg"

[widget.clock]
format = "{:%e %b  %H:%M}"
scale = 0.90000000000000013

[widget.media]
hide_when_no_media = true
max_length = 180
title_scroll = "on_hover"

[widget.tray]
scale = 1.1500000000000001

[widget.workspaces]
capsule_radius = 12
empty_color = "surface"
font_weight = 700
inactive_pill_size = 1.2000000000000002
occupied_color = "surface"
scale = 1.25
